<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Visitenkarte – Ferienhaus Einruhr</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Roboto:wght@300;400;500;700&display=swap');
  /* ═══ Druck-Setup ═══ */
  @page { size: 85mm 55mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background: #e8e8e8;
    padding: 20px 0;
    font-family: Roboto, "Segoe UI", Arial, sans-serif;
  }

  /* ═══ Einzelkarte ═══ */
  .card {
    width: 85mm;
    height: 55mm;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,.12);
    background: #fff;
    color: #263532;
    display: flex;
    flex-direction: column;
  }

  /* Natur-Deko-Streifen oben */
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3mm;
    background: linear-gradient(90deg,
      hsl(146, 38%, 30%)   0%,
      hsl(160, 35%, 45%)  50%,
      hsl(210, 80%, 56%) 100%
    );
    z-index: 2;
  }

  /* ═══ Header ═══ */
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5.5mm 5mm 0 5mm;
    position: relative;
    z-index: 1;
  }
  .card-header img {
    width: 13mm;
    height: auto;
    flex-shrink: 0;
  }
  .card-header .title-block { line-height: 1.2; }
  .card-header .name {
    font-family: "Playfair Display", Georgia, "Times New Roman", serif;
    font-size: 15pt;
    font-weight: 700;
    color: hsl(146, 38%, 30%);
  }
  .card-header .subtitle {
    font-size: 8pt;
    font-weight: 400;
    color: hsl(146, 20%, 45%);
    margin-top: 0.3mm;
  }

  /* ═══ Body ═══ */
  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 5mm;
    position: relative;
    z-index: 1;
  }

  /* ── Kontakt ── */
  .contact {
    display: flex;
    flex-direction: column;
    gap: 0.6mm;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 2mm;
    font-size: 8pt;
    color: #345049;
  }
  .contact-item .icon {
    width: 3.5mm;
    text-align: center;
    flex-shrink: 0;
    font-size: 9pt;
    opacity: 0.6;
  }
  .contact-item a {
    color: inherit;
    text-decoration: none;
  }
  .contact-item a:hover {
    color: hsl(210, 80%, 56%);
  }

  /* ── Footer ── */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5mm 3.5mm 5mm;
    position: relative;
    z-index: 1;
  }
  .card-footer .url {
    font-size: 9pt;
    font-weight: 600;
    color: hsl(146, 38%, 30%);
  }
  .card-footer .url a {
    color: inherit;
    text-decoration: none;
  }

  /* ═══ Druck ═══ */
  @media print {
    body { background: none; padding: 0; }
    .card { box-shadow: none; page-break-after: always; }
    .info-bar { display: none; }
  }

  /* ═══ 9er-Bogen ═══ */
  #multi-view {
    display: grid;
    grid-template-columns: repeat(3, 85mm);
    grid-template-rows: repeat(3, 55mm);
    gap: 0;
    margin: 10px auto;
    background: white;
  }
  #multi-view .card { box-shadow: none; border: 0.1mm solid #ddd; }
  #multi-view .card + .card { border-left: none; }
  @media print {
    #single-view { display: none; }
    #multi-view { display: grid !important; margin: 0; }
  }
  @media screen {
    #multi-view { display: none; }
  }

  .info-bar {
    font: 11px/1.4 sans-serif;
    color: #555;
    background: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin: 10px auto;
    max-width: 500px;
    text-align: center;
  }
  .info-bar strong { color: #111; }

  #card-template { display: none; }
</style>
</head>
<body>

<div class="info-bar">
  <strong>🏡 Visitenkarte 85×55mm – Ferienhaus Einruhr</strong><br>
  Einzelansicht unten · Zum Drucken: <strong>Strg+P</strong> → 9 Karten pro A4-Bogen
</div>

<!-- ─── Template ─── -->
<div id="card-template">
  <div class="card">
    <div class="card-header">
      <img src="public/lovable-uploads/Waldoase_Mertens_Logo.webp" alt="Waldoase Mertens Logo" onerror="this.style.display='none'">
      <div class="title-block">
        <div class="name">Ferienhaus Einruhr</div>
        <div class="subtitle">Waldoase Mertens · Nationalpark Eifel</div>
      </div>
    </div>
    <div class="card-body">
      <div class="contact">
        <div class="contact-item">
          <span class="icon">📍</span>
          <span>Heilsteinstr. 39, 52152 Simmerath-Einruhr</span>
        </div>
        <div class="contact-item">
          <span class="icon">📞</span>
          <span>+49 1517 4412216</span>
        </div>
        <div class="contact-item">
          <span class="icon">✉️</span>
          <a href="mailto:fewo@amertens.me">fewo@amertens.me</a>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span class="url"><a href="https://fewo.amertens.me">fewo.amertens.me</a></span>
    </div>
  </div>
</div>

<!-- ─── Einzelansicht ─── -->
<div id="single-view"></div>

<!-- ─── 9er-Bogen ─── -->
<div id="multi-view"></div>

<script>
  (function() {
    var tpl = document.getElementById('card-template').innerHTML;
    document.getElementById('single-view').innerHTML = tpl;
    var mw = document.getElementById('multi-view');
    for (var i = 0; i < 9; i++) mw.innerHTML += tpl;
  })();
</script>

</body>
</html>
